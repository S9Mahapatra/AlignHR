services:
  alignhr-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: alignhr-server
    restart: unless-stopped
    env_file:
      - ./server/.env
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
